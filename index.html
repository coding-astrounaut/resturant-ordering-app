<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- CSS Styles -->
        <link rel="stylesheet" href="./index.css">

        <!-- Fonts -->
         <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Smythe&display=swap" rel="stylesheet">

    </head>

    <body>
        <div id="container">
            <header>
                <h1>Jimmy's Diner</h1>
                <h2>The Best burgers and pizzas in town!</h2>
            </header>
            <main>
                <section id="menu">

                </section>
                <section id="payment">
                    <h2>Your Order</h2>
                    <div id="items">
                        
                    </div>
                    <hr>
                    <div id="total">
                    
                    </div>
                    <button id="order-btn">Complete Order</button>
                </section>
            </main>
            <div id="modal">
                <h2>Enter card details</h2>
                <form id="payment-form">
                    <input type="text" name="card-name" placeholder="Enter your name" aria-label="Enter your name" id='name-input' required>
                    <input type="text" name="card-number" placeholder="Enter your card number" aria-label="Enter your card number" id='card-input' required>
                    <input type="text" name="card-cvv" placeholder="Enter your card CVV" aria-label="Enter your card CVV" id='ccv-input' required>
                    <button type="submit" id="payment-btn" >Pay</button>
                </form>
            </div>
        </div>  

        <script src="./index.js" type="module"></script>
        
    </body>

</html>
